<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Master Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
background-size:300% 300%;
animation:bg 8s infinite alternate;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
width:100%;
max-width:750px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
color:white;
}

h1{
text-align:center;
margin-bottom:20px;
font-size:38px;
}

.progressBar{
height:12px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

#progress{
margin-bottom:15px;
font-weight:bold;
}

#timer{
float:right;
background:#ef4444;
padding:8px 15px;
border-radius:30px;
font-weight:bold;
}

#question{
font-size:28px;
margin:20px 0;
font-weight:600;
}

.option{
display:block;
width:100%;
margin:12px 0;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:#e0f2fe;
cursor:pointer;
transition:.3s;
color:#111;
font-weight:600;
}

.option:hover{
transform:translateY(-3px);
background:#7dd3fc;
}

.correct{
background:#22c55e!important;
color:white;
}

.wrong{
background:#ef4444!important;
color:white;
}

#nextBtn{
margin-top:20px;
display:none;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
transition:.3s;
}

#nextBtn:hover{
background:#1d4ed8;
}

#result{
display:none;
text-align:center;
}

.circle{
width:180px;
height:180px;
border-radius:50%;
background:#22c55e;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
margin:30px auto;
color:white;
}

#restartBtn{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
cursor:pointer;
}

#restartBtn:hover{
background:#15803d;
}

</style>
</head>

<body>

<div class="container">

<h1>💻 Tech Master Quiz</h1>

<div class="progressBar">
<div id="bar"></div>
</div>

<div id="progress"></div>

<div id="timer">20</div>

<div id="quiz">

<div id="question"></div>

<div id="options"></div>

<button id="nextBtn">Next ➜</button>

</div>

<div id="result">

<h2>🎉 Quiz Finished</h2>

<div class="circle" id="percent"></div>

<h2 id="score"></h2>

<button id="restartBtn">Restart Quiz</button>

</div>

</div>

<script>

const questions = [

{
question: "Which language is mainly used for styling web pages?",
options: [
"HTML",
"CSS",
"JavaScript",
"Python"
],
answer: "CSS"
},

{
question: "Which HTML element is used to display an image?",
options: [
"img",
"picture",
"image",
"src"
],
answer: "img"
},

{
question: "What does HTML stand for?",
options: [
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Tool Multi Language",
"Home Text Markup Language"
],
answer: "Hyper Text Markup Language"
},

{
question: "Which company developed the Java programming language?",
options: [
"Microsoft",
"Sun Microsystems",
"Google",
"Apple"
],
answer: "Sun Microsystems"
},

{
question: "Which symbol is used for a single-line comment in JavaScript?",
options: [
"//",
"#",
"<!-- -->",
"**"
],
answer: "//"
},

{
question: "What does CPU stand for?",
options: [
"Central Processing Unit",
"Central Program Unit",
"Computer Processing Unit",
"Control Processing Unit"
],
answer: "Central Processing Unit"
},

{
question: "Which keyword is used to declare a constant in JavaScript?",
options: [
"var",
"let",
"const",
"static"
],
answer: "const"
},

{
question: "Which protocol is used to access websites on the Internet?",
options: [
"FTP",
"SMTP",
"HTTP",
"TCP"
],
answer: "HTTP"
},

{
question: "Which company developed the Windows operating system?",
options: [
"Google",
"Apple",
"Microsoft",
"IBM"
],
answer: "Microsoft"
},

{
question: "Which language is commonly used to interact with databases?",
options: [
"Python",
"Java",
"SQL",
"C++"
],
answer: "SQL"
}

];
let current=0;
let score=0;
let time=20;
let timer;

const question=document.getElementById("question");
const options=document.getElementById("options");
const progress=document.getElementById("progress");
const next=document.getElementById("nextBtn");

function startTimer(){

clearInterval(timer);

time=20;

document.getElementById("timer").innerHTML=time;

timer=setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=time;

if(time==0){

clearInterval(timer);

next.style.display="inline-block";

}

},1000);

}

function loadQuestion(){

startTimer();

next.style.display="none";

options.innerHTML="";

document.getElementById("bar").style.width=
((current/questions.length)*100)+"%";

progress.innerHTML=
"Question "+(current+1)+" of "+questions.length;

let q=questions[current];

question.innerHTML=q.question;

q.options.forEach(op=>{

let btn=document.createElement("button");

btn.innerHTML=op;

btn.className="option";

btn.onclick=function(){

check(btn,q.answer);

};

options.appendChild(btn);

});

}

function check(btn,ans){

clearInterval(timer);

document.querySelectorAll(".option").forEach(b=>{

b.disabled=true;

if(b.innerHTML==ans)

b.classList.add("correct");

if(b==btn && b.innerHTML!=ans)

b.classList.add("wrong");

});

if(btn.innerHTML==ans)

score++;

next.style.display="inline-block";

}

next.onclick=function(){

current++;

if(current<questions.length){

loadQuestion();

}
else{

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

let p=Math.round(score/questions.length*100);

document.getElementById("percent").innerHTML=p+"%";

document.getElementById("score").innerHTML=
"Score : "+score+" / "+questions.length;

document.getElementById("bar").style.width="100%";

}

}

document.getElementById("restartBtn").onclick=function(){

current=0;
score=0;

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
